services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-trafficpanel_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-traffic_panel}
      MYSQL_USER: ${MYSQL_USER:-trafficpanel}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-trafficpanel_pass}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-trafficpanel_root}"]
      interval: 10s
      timeout: 5s
      retries: 20

  panel:
    build:
      context: .
      dockerfile: Dockerfile
    image: trafficpanel:local
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TP_MODE: server
      TP_HTTP_ADDR: :8080
      TP_APP_NAME: Traffic Panel
      TP_BASE_URL: ${TP_BASE_URL:-http://127.0.0.1:8080}
      TP_DATABASE_DSN: ${MYSQL_USER:-trafficpanel}:${MYSQL_PASSWORD:-trafficpanel_pass}@tcp(mysql:3306)/${MYSQL_DATABASE:-traffic_panel}?parseTime=true&charset=utf8mb4&loc=Local
      TP_MASTER_SECRET: ${TP_MASTER_SECRET:-change-me}
      TP_BOOTSTRAP_ADMIN_USER: ${TP_BOOTSTRAP_ADMIN_USER:-admin}
      TP_BOOTSTRAP_ADMIN_PASS: ${TP_BOOTSTRAP_ADMIN_PASS:-admin123456}
      TP_EPAY_API_URL: ${TP_EPAY_API_URL:-}
      TP_EPAY_PID: ${TP_EPAY_PID:-}
      TP_EPAY_KEY: ${TP_EPAY_KEY:-}
      TP_EPAY_TYPE: ${TP_EPAY_TYPE:-alipay}
      TP_BEPUSDT_API_URL: ${TP_BEPUSDT_API_URL:-}
      TP_BEPUSDT_PID: ${TP_BEPUSDT_PID:-}
      TP_BEPUSDT_KEY: ${TP_BEPUSDT_KEY:-}
      TP_BEPUSDT_TYPE: ${TP_BEPUSDT_TYPE:-usdt}
    ports:
      - "${TP_HTTP_PORT:-8080}:8080"

volumes:
  mysql-data:
